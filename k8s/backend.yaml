apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: aviral0506/nearkart-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        envFrom:
        - secretRef:
            name: backend-secret
        env:
        - name: FRONTEND_URL
          value: "http://localhost"
        - name: PORT
          value: "5000"
        - name: MONGODB_URI
          value: "mongodb://mongodb:27017/nearkart"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
  - name: http-metrics
    port: 5000
    targetPort: 5000
